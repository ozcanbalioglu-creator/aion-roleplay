name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint → typecheck → test → build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Minimal env so Next.js config and vitest mocks don't explode
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
      OPENAI_API_KEY: placeholder
      ELEVENLABS_API_KEY: placeholder
      UPSTASH_QSTASH_TOKEN: placeholder
      UPSTASH_QSTASH_CURRENT_SIGNING_KEY: placeholder
      UPSTASH_QSTASH_NEXT_SIGNING_KEY: placeholder
      QSTASH_RECEIVER_URL: https://placeholder.example.com/api/sessions/placeholder/evaluate
      RESEND_API_KEY: placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_ENV: ci
      # Feature flags — all off in CI (no external services)
      FEATURE_VOICE_ENABLED: 'false'
      FEATURE_GAMIFICATION_ENABLED: 'false'
      FEATURE_ANALYTICS_ENABLED: 'false'
      FEATURE_BULK_UPLOAD_ENABLED: 'false'
      FEATURE_PROGRESS_PAGE_ENABLED: 'false'
      FEATURE_NOTIFICATIONS_PAGE_ENABLED: 'false'
      FEATURE_MANAGER_PAGES_ENABLED: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Verify migrations
        run: npm run verify-migrations

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
